<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Checklisten App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="main-header">
        <h1>AP Checklisten App</h1>
        <div id="user-info" class="hidden">
            <span id="user-email"></span>
            <button id="btn-logout">Logout</button>
        </div>
    </header>

    <main id="app-container">
        <section id="login-section">
            <h2>Login</h2>
            <input type="email" id="email-input" placeholder="E-Mail Adresse" required>
            <input type="password" id="password-input" placeholder="Passwort" required>
            <button id="btn-login">Einloggen</button>
        </section>

        <section id="admin-section" class="hidden">
            <h2>Admin Dashboard</h2>
            <div class="admin-nav">
                <button id="btn-create-checklist">➕ Neue Checkliste erstellen</button>
                <button id="btn-view-results" style="background: #2196F3;">📊 Ergebnisse ansehen</button>
            </div>
            <div id="admin-checklists-list"></div>
        </section>

        <section id="checklist-builder-section" class="hidden">
            <h2>Neue Checkliste bauen</h2>
            <input type="text" id="new-checklist-title" placeholder="Titel (z.B. Druckbehälter Prüfung)" required>
            
            <div id="builder-items"></div>
            
            <div class="builder-tool">
                <h4>Prüfpunkt hinzufügen:</h4>
                <input type="text" id="new-item-text" placeholder="Frage / Anweisung">
                <select id="new-item-type">
                    <option value="yes_no_na">Ja / Nein / N.A.</option>
                    <option value="number_unit">Zahl + Einheit</option>
                </select>
                <input type="text" id="new-item-units" class="hidden" placeholder="Einheiten (z.B. Bar, °C, mbar)">
                <button id="btn-add-item" style="background: #2196F3;">Punkt hinzufügen</button>
            </div>
            
            <button id="btn-save-new-checklist">Checkliste speichern</button>
            <button id="btn-cancel-builder" class="btn-secondary">Abbrechen</button>
        </section>

        <section id="user-section" class="hidden">
            <h2>Verfügbare Checklisten</h2>
            <div id="user-checklists-list"></div>
        </section>

        <section id="active-checklist-section" class="hidden">
            <h2 id="active-checklist-title"></h2>
            <form id="checklist-form"></form>
            <button id="btn-submit-checklist">Checkliste abschließen</button>
            <button id="btn-cancel-checklist" class="btn-secondary">Abbrechen</button>
        </section>

        <section id="results-section" class="hidden">
            <h2>Abgeschlossene Prüfungen</h2>
            <div id="results-list"></div>
            <button id="btn-close-results" class="btn-secondary">Zurück zum Dashboard</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
