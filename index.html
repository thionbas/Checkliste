<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Checklisten App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="main-header">
        <h1>AP Checklisten App</h1>
        <div id="user-info" class="hidden">
            <span id="user-email"></span>
            <button id="btn-logout">Logout</button>
        </div>
    </header>

    <main id="app-container">
        <section id="login-section">
            <h2>Login</h2>
            <input type="email" id="email-input" placeholder="E-Mail Adresse" required>
            <input type="password" id="password-input" placeholder="Passwort" required>
            <button id="btn-login">Einloggen</button>
        </section>

        <section id="admin-section" class="hidden">
            <h2>Admin Dashboard</h2>
            <button id="btn-create-checklist">Neue Checkliste erstellen</button>
            <div id="admin-checklists-list"></div>
        </section>

        <section id="checklist-builder-section" class="hidden">
            <h2>Neue Checkliste bauen</h2>
            <input type="text" id="new-checklist-title" placeholder="Titel der Checkliste (z.B. Druckbehälter Prüfung)" required>
            
            <div id="builder-items" style="margin-bottom: 20px;"></div>
            
            <div style="background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; margin-bottom: 20px;">
                <h4>Neuen Prüfpunkt hinzufügen:</h4>
                <input type="text" id="new-item-text" placeholder="Frage / Anweisung (z.B. Sichtprüfung OK?)">
                <select id="new-item-type">
                    <option value="yes_no_na">Ja / Nein / N.A.</option>
                    <option value="number_unit">Zahl + Einheit eintragen</option>
                </select>
                <input type="text" id="new-item-units" class="hidden" placeholder="Einheiten kommagetrennt (z.B. Bar, mbar, °C)">
                <button id="btn-add-item" style="background: #2196F3;">Punkt zur Liste hinzufügen</button>
            </div>
            
            <button id="btn-save-new-checklist">Checkliste in Datenbank speichern</button>
            <button id="btn-cancel-builder" style="background: #f44336; margin-top: 10px;">Abbrechen</button>
        </section>

        <section id="user-section" class="hidden">
            <h2>Verfügbare Checklisten</h2>
            <div id="user-checklists-list"></div>
        </section>

        <section id="active-checklist-section" class="hidden">
            <h2 id="active-checklist-title"></h2>
            <form id="checklist-form"></form>
            <button id="btn-submit-checklist">Checkliste abschließen</button>
            <button id="btn-cancel-checklist" style="background: #f44336; margin-top: 10px;">Zurück zur Übersicht</button>
        </section>

        <section id="results-section" class="hidden">
            <h2>Bisherige Ergebnisse</h2>
            <div id="results-list"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
